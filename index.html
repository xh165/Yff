<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10">
    <title>Document</title>
    <style>
        div{
            background-color:rgb(255, 255, 255);
            width: 500px;
            height: 500px;
        }
        #aa{
            animation: xx 0.2s linear 0s infinite alternate running;
            box-shadow: 20px 20px 100px rgb(167, 170, 172);
            /* margin:10px 10px 10px 10px; */
            /* transform: translate(50%,50%); */
            float: left;
            /* display: table-cell;
            text-align: center;
            vertical-align: middle; */
        }
        @keyframes xx{
            0%{
                width: 200px; 
                height: 200px; 
                background-color: rgb(227, 223, 4);
                border-radius: 10%;
                transform: translate(50%,50%);
            }
            25%{
                width: 160px; 
                height: 160px; 
                background-color: rgb(255, 0, 0);
                border-radius: 30%;
                transform: translate(73%,73%);
            }
            50%{
                width: 200px; 
                height: 200px; 
                background-color: rgb(125, 255, 125);
                border-radius: 10%;
                transform: translate(50%,50%);
            }
            75%{
                width: 160px; 
                height: 160px; 
                background-color: rgb(0, 255, 255);
                border-radius: 30%;
                transform: translate(73%,73%);
            }
            100%{
                width: 200px; 
                height: 200px; 
                background-color: rgb(150, 150, 255);
                border-radius: 10%;
                transform: translate(50%,50%);
            }

        }
        p{
            margin: 40% 0 0 25%;
            font-size: 30px;
            float: left;
        }
        
    </style>
</head>

<body>
    <div>
        <div id="aa">
            <p>朱霄颖</p>
        </div>
       
    </div>
</body>


</html>
